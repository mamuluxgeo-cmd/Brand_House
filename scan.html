<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Brand House · სკანერი</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F6F2;
    --surface: #FFFFFF;
    --border: #E4E2DC;
    --text: #1A1A18;
    --muted: #7A7870;
    --accent: #1B4332;
    --green: #2D6A4F;
    --green-bg: #D8F3DC;
    --red: #C1121F;
    --red-bg: #FFE8E9;
    --orange: #CA6702;
    --orange-bg: #FFF3CD;
    --gray-bg: #F0EFEA;
    --blue: #1B4F8A;
    --blue-bg: #E8F0FE;
    --font: 'Noto Sans Georgian', sans-serif;
    --mono: 'DM Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 14px; min-height: 100vh; overscroll-behavior: none; }

  /* SCREENS */
  .screen { display: none; flex-direction: column; min-height: 100vh; }
  .screen.active { display: flex; }

  /* ========== SCREEN 1: WELCOME ========== */
  .welcome {
    justify-content: center;
    align-items: center;
    padding: 32px 24px;
    text-align: center;
    gap: 0;
  }
  .logo-wrap { margin-bottom: 28px; }
  .logo-wrap img { width: 72px; height: 72px; object-fit: contain; border-radius: 16px; background: var(--accent); padding: 10px; }
  .logo-placeholder {
    width: 72px; height: 72px; border-radius: 16px; background: var(--accent);
    display: flex; align-items: center; justify-content: center; margin: 0 auto;
    color: #fff; font-size: 24px; font-weight: 600;
  }
  .welcome h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .welcome .sub { color: var(--muted); font-size: 13px; margin-bottom: 32px; }

  .form-group { width: 100%; max-width: 320px; margin-bottom: 14px; text-align: left; }
  .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .form-group input {
    width: 100%;
    padding: 13px 16px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 15px;
    font-family: var(--font);
    background: var(--surface);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus { border-color: var(--accent); }
  .form-group input.mono-input { font-family: var(--mono); font-size: 20px; letter-spacing: 0.05em; }

  .btn-big {
    width: 100%;
    max-width: 320px;
    padding: 15px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-family: var(--font);
    font-weight: 600;
    cursor: pointer;
    margin-top: 6px;
    transition: background 0.2s, transform 0.1s;
  }
  .btn-big:active { transform: scale(0.98); }
  .btn-big:disabled { opacity: 0.5; }

  /* ========== SCREEN 2: SCAN ========== */
  .scan-screen { background: var(--bg); }

  /* HEADER */
  .scan-header {
    background: var(--accent);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    color: #fff;
    flex-shrink: 0;
  }
  .scan-header .op-badge {
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 500;
    background: rgba(255,255,255,0.15);
    padding: 4px 10px;
    border-radius: 8px;
  }
  .scan-header .emp { font-size: 12px; opacity: 0.7; margin-left: auto; }

  /* FILTER TABS */
  .filter-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 14px;
    display: flex;
    gap: 6px;
    overflow-x: auto;
    flex-shrink: 0;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .ftab {
    flex-shrink: 0;
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    border: 1.5px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    color: var(--text);
    transition: all 0.15s;
    white-space: nowrap;
  }
  .ftab.active { background: var(--text); color: #fff; border-color: var(--text); }

  /* SCAN INPUT */
  .scan-input-wrap {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 14px;
    flex-shrink: 0;
  }
  .scan-input-label { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 5px; }
  .scan-input-row { display: flex; align-items: center; gap: 8px; }
  #barcodeInput {
    flex: 1;
    padding: 11px 14px;
    border: 2px solid var(--accent);
    border-radius: 10px;
    font-size: 15px;
    font-family: var(--mono);
    background: var(--surface);
    color: var(--text);
    outline: none;
    letter-spacing: 0.03em;
  }
  .clear-btn {
    padding: 11px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    font-size: 14px;
    cursor: pointer;
    color: var(--muted);
  }
  .scan-count-row {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    font-size: 11px;
    color: var(--muted);
  }
  .scan-count-row .count { font-weight: 600; color: var(--text); font-family: var(--mono); }

  /* ITEMS LIST */
  .items-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px 14px;
    padding-bottom: 90px;
  }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 8px 0 5px;
  }

  .item-card {
    background: var(--surface);
    border-radius: 10px;
    padding: 11px 14px;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-left: 4px solid transparent;
    transition: transform 0.1s;
  }
  .item-card.matched  { border-left-color: var(--green); background: #FAFFFE; }
  .item-card.over     { border-left-color: var(--orange); background: #FFFEF8; }
  .item-card.under    { border-left-color: var(--red); background: #FFFAFA; }
  .item-card.pending  { border-left-color: var(--border); background: var(--gray-bg); }
  .item-card.flash    { transform: scale(1.01); }

  .item-info { flex: 1; min-width: 0; }
  .item-barcode { font-family: var(--mono); font-size: 12px; color: var(--muted); }
  .item-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-status { font-size: 11px; margin-top: 2px; }
  .item-status.green { color: var(--green); }
  .item-status.red   { color: var(--red); }
  .item-status.orange { color: var(--orange); }
  .item-status.muted  { color: var(--muted); }

  .item-qty {
    text-align: right;
    flex-shrink: 0;
  }
  .item-qty .nums { font-family: var(--mono); font-size: 16px; font-weight: 600; }
  .item-qty .nums.green  { color: var(--green); }
  .item-qty .nums.red    { color: var(--red); }
  .item-qty .nums.orange { color: var(--orange); }
  .item-qty .nums.muted  { color: var(--muted); }
  .item-qty .denom { font-size: 11px; color: var(--muted); font-family: var(--mono); }

  /* BOTTOM BAR */
  .bottom-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 10px 14px;
    display: flex;
    gap: 10px;
    z-index: 100;
  }
  .btn-log {
    flex: 1;
    padding: 13px;
    background: var(--gray-bg);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    font-size: 13px;
    font-family: var(--font);
    font-weight: 500;
    cursor: pointer;
    color: var(--text);
  }
  .btn-send {
    flex: 2;
    padding: 13px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-family: var(--font);
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  .btn-send:active { transform: scale(0.98); }
  .btn-send:disabled { opacity: 0.5; }

  /* UNKNOWN BARCODE FLASH */
  #unknownFlash {
    position: fixed;
    top: 0; left: 0; right: 0;
    background: var(--red);
    color: #fff;
    padding: 10px;
    text-align: center;
    font-size: 13px;
    font-weight: 500;
    transform: translateY(-100%);
    transition: transform 0.25s;
    z-index: 200;
  }
  #unknownFlash.show { transform: translateY(0); }

  /* ========== MODAL: LOG ========== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 500;
    align-items: flex-end;
  }
  .modal-overlay.show { display: flex; }
  .modal-sheet {
    background: var(--surface);
    border-radius: 18px 18px 0 0;
    width: 100%;
    max-height: 70vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 0; }
  .modal-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .modal-header h3 { font-size: 15px; font-weight: 600; }
  .modal-close { background: var(--gray-bg); border: none; width: 28px; height: 28px; border-radius: 50%; font-size: 14px; cursor: pointer; }
  .modal-body { overflow-y: auto; flex: 1; padding: 8px 0; }

  .log-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 18px;
    border-bottom: 1px solid var(--border);
  }
  .log-time { font-family: var(--mono); font-size: 12px; color: var(--muted); flex-shrink: 0; }
  .log-barcode { font-family: var(--mono); font-size: 12px; flex: 1; overflow: hidden; text-overflow: ellipsis; }
  .log-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .log-dot.green  { background: var(--green); }
  .log-dot.red    { background: var(--red); }
  .log-dot.orange { background: var(--orange); }

  /* ========== MODAL: SUMMARY ========== */
  .summary-modal {
    background: var(--surface);
    border-radius: 18px 18px 0 0;
    width: 100%;
    padding: 24px 20px;
  }
  .summary-title { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
  .summary-sub { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
  .summary-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .summary-stat { padding: 14px; border-radius: 10px; text-align: center; }
  .summary-stat .label { font-size: 11px; margin-bottom: 4px; }
  .summary-stat .value { font-size: 24px; font-weight: 600; font-family: var(--mono); }

  /* ========== TOAST ========== */
  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--text);
    color: #fff;
    padding: 10px 20px;
    border-radius: 30px;
    font-size: 13px;
    z-index: 1000;
    opacity: 0;
    transition: all 0.3s;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 36px; margin-bottom: 10px; }
</style>
</head>
<body>

<!-- UNKNOWN FLASH -->
<div id="unknownFlash">⚠️ ბარკოდი ვერ მოიძებნა</div>

<!-- ========== SCREEN 1: WELCOME ========== -->
<div class="screen welcome active" id="screenWelcome">
  <div class="logo-wrap">
    <img src="logo.png" alt="BH" onerror="this.outerHTML='<div class=logo-placeholder>BH</div>'">
  </div>
  <h1>Brand House</h1>
  <p class="sub">საწყობის სკანერი</p>

  <div class="form-group">
    <label>შენი სახელი</label>
    <input type="text" id="empNameInput" placeholder="მაგ: გიორგი" autocomplete="name">
  </div>
  <div class="form-group">
    <label>ოპერაციის ნომერი</label>
    <input type="number" id="opIdInput" placeholder="მაგ: 1001" class="mono-input" inputmode="numeric">
  </div>
  <button class="btn-big" onclick="loadOperation()" id="loadBtn">ჩატვირთვა →</button>
  <p style="margin-top:14px; font-size:12px; color:var(--muted)" id="loadMsg"></p>
</div>

<!-- ========== SCREEN 2: SCAN ========== -->
<div class="screen scan-screen" id="screenScan">
  <div class="scan-header">
    <span class="op-badge" id="headerOpId">#—</span>
    <span style="font-size:13px; opacity:0.8">სკანირება</span>
    <span class="emp" id="headerEmp"></span>
  </div>

  <div class="filter-bar">
    <span class="ftab active" onclick="setFilter('all', this)">ყველა <span id="cntAll">0</span></span>
    <span class="ftab" onclick="setFilter('matched', this)">✓ სწორი <span id="cntMatched">0</span></span>
    <span class="ftab" onclick="setFilter('under', this)">− ნაკლები <span id="cntUnder">0</span></span>
    <span class="ftab" onclick="setFilter('over', this)">+ ლიშნური <span id="cntOver">0</span></span>
    <span class="ftab" onclick="setFilter('pending', this)">○ ელოდება <span id="cntPending">0</span></span>
  </div>

  <div class="scan-input-wrap">
    <div class="scan-input-label">ბარკოდი</div>
    <div class="scan-input-row">
      <input type="text" id="barcodeInput" placeholder="სკანერი ან ხელით" autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="clear-btn" onclick="clearInput()">✕</button>
    </div>
    <div class="scan-count-row">
      <span>სკანირებული: <span class="count" id="scanCount">0</span></span>
      <span>სულ პოზიცია: <span class="count" id="totalCount">0</span></span>
    </div>
  </div>

  <div class="items-list" id="itemsList"></div>

  <div class="bottom-bar">
    <button class="btn-log" onclick="showLog()">📋 ლოგი</button>
    <button class="btn-send" onclick="showSummary()" id="sendBtn">გაგზავნა →</button>
  </div>
</div>

<!-- LOG MODAL -->
<div class="modal-overlay" id="logModal" onclick="if(event.target===this)closeLog()">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <h3>სკანების ლოგი</h3>
      <button class="modal-close" onclick="closeLog()">✕</button>
    </div>
    <div class="modal-body" id="logBody"></div>
  </div>
</div>

<!-- SUMMARY MODAL -->
<div class="modal-overlay" id="summaryModal">
  <div class="summary-modal">
    <p class="summary-title">გაგზავნა?</p>
    <p class="summary-sub" id="summaryOpInfo"></p>
    <div class="summary-stats">
      <div class="summary-stat" style="background:var(--green-bg)">
        <div class="label" style="color:var(--green)">სწორი</div>
        <div class="value" style="color:var(--green)" id="sumMatched">0</div>
      </div>
      <div class="summary-stat" style="background:var(--red-bg)">
        <div class="label" style="color:var(--red)">ნაკლები</div>
        <div class="value" style="color:var(--red)" id="sumUnder">0</div>
      </div>
      <div class="summary-stat" style="background:var(--orange-bg)">
        <div class="label" style="color:var(--orange)">ლიშნური</div>
        <div class="value" style="color:var(--orange)" id="sumOver">0</div>
      </div>
      <div class="summary-stat" style="background:var(--gray-bg)">
        <div class="label" style="color:var(--muted)">ელოდება</div>
        <div class="value" style="color:var(--muted)" id="sumPending">0</div>
      </div>
    </div>
    <div style="display:flex; gap:10px;">
      <button class="btn-log" onclick="closeSummary()" style="flex:1">გაუქმება</button>
      <button class="btn-send" onclick="sendResults()" id="confirmSendBtn" style="flex:2">✓ დადასტურება</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxqLjS6FyJl3ghAaJytl4ZZ4Rm0-xF8SxSiNa6QcD3Rf4lfFbKW7rMQ2NEtZ4hzxWF_/exec';

// STATE
let items = {};        // barcode → { productName, colorSize, expectedQty, scannedQty }
let scanLog = [];      // { time, barcode, status }
let currentFilter = 'all';
let operationId = null;
let employeeName = '';

// ========== WELCOME / LOAD ==========
window.onload = () => {
  const saved = localStorage.getItem('bh_employee');
  if (saved) document.getElementById('empNameInput').value = saved;
};

async function loadOperation() {
  const emp  = document.getElementById('empNameInput').value.trim();
  const opId = document.getElementById('opIdInput').value.trim();
  const msg  = document.getElementById('loadMsg');

  if (!emp)  { msg.textContent = '⚠️ გთხოვ სახელი შეიყვანო'; return; }
  if (!opId) { msg.textContent = '⚠️ ოპერაციის ნომერი შეიყვანო'; return; }

  const btn = document.getElementById('loadBtn');
  btn.textContent = 'იტვირთება...';
  btn.disabled = true;
  msg.textContent = '';

  try {
    // Check localStorage for saved session
    const saved = localStorage.getItem('bh_session_' + opId);
    if (saved) {
      const session = JSON.parse(saved);
      if (confirm('ნახვეული სესია ნაპოვნია ოპერაცია #' + opId + '-ზე. გავაგრძელოთ?')) {
        items = session.items;
        scanLog = session.scanLog || [];
        startScan(emp, opId);
        return;
      }
    }

    const res = await fetch(`${SCRIPT_URL}?action=getOperation&id=${opId}`);
    const data = await res.json();

    if (data.error) { msg.textContent = '❌ ' + data.error; return; }

    // Build items map
    items = {};
    data.items.forEach(item => {
      items[item.barcode] = {
        productName: item.productName,
        colorSize: item.colorSize,
        expectedQty: item.expectedQty,
        scannedQty: 0
      };
    });
    scanLog = [];
    startScan(emp, opId);

  } catch(e) {
    msg.textContent = '❌ კავშირის შეცდომა. ინტერნეტი შეამოწმე.';
  } finally {
    btn.textContent = 'ჩატვირთვა →';
    btn.disabled = false;
  }
}

function startScan(emp, opId) {
  employeeName = emp;
  operationId  = opId;
  localStorage.setItem('bh_employee', emp);

  document.getElementById('headerOpId').textContent = '#' + opId;
  document.getElementById('headerEmp').textContent  = emp;
  document.getElementById('totalCount').textContent = Object.keys(items).length;

  showScreen('screenScan');
  renderItems();
  updateCounts();
  focusInput();
}

// ========== SCAN INPUT ==========
const barcodeInput = document.getElementById('barcodeInput');

barcodeInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') processBarcode();
});

// Auto-detect scanner: if value arrives fast (< 80ms from first char)
let scanBuffer = '';
let scanTimer = null;
barcodeInput.addEventListener('input', () => {
  clearTimeout(scanTimer);
  scanBuffer = barcodeInput.value;
  scanTimer = setTimeout(() => {
    if (scanBuffer.length > 0) processBarcode();
  }, 80);
});

function clearInput() {
  barcodeInput.value = '';
  focusInput();
}

function focusInput() {
  barcodeInput.focus();
}

// Refocus whenever user taps anywhere on scan screen
document.getElementById('screenScan').addEventListener('click', e => {
  if (!e.target.closest('button, .ftab, .modal-overlay')) {
    focusInput();
  }
});

function processBarcode() {
  const code = barcodeInput.value.trim();
  barcodeInput.value = '';
  if (!code) return;

  const item = items[code];
  if (!item) {
    showUnknown(code);
    vibrate([100, 50, 100]);
    return;
  }

  item.scannedQty++;
  saveSession();
  vibrate([50]);

  // Log entry
  const now = new Date();
  const timeStr = now.toTimeString().slice(0,8);
  const diff = item.scannedQty - item.expectedQty;
  const status = diff === 0 ? 'matched' : diff > 0 ? 'over' : 'under';
  scanLog.unshift({ time: timeStr, barcode: code, status });

  // Update count
  document.getElementById('scanCount').textContent =
    Object.values(items).filter(i => i.scannedQty > 0).length;

  updateCounts();
  renderItems();
  focusInput();
}

function showUnknown(code) {
  const el = document.getElementById('unknownFlash');
  el.textContent = '⚠️ ვერ მოიძებნა: ' + code;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1800);
}

function vibrate(pattern) {
  if (navigator.vibrate) navigator.vibrate(pattern);
}

// ========== RENDER ==========
function getStatus(item) {
  if (item.scannedQty === 0) return 'pending';
  const diff = item.scannedQty - item.expectedQty;
  return diff === 0 ? 'matched' : diff > 0 ? 'over' : 'under';
}

function renderItems() {
  const list = document.getElementById('itemsList');
  let entries = Object.entries(items);

  // Filter
  if (currentFilter !== 'all') {
    entries = entries.filter(([, item]) => getStatus(item) === currentFilter);
  }

  // Sort: most recently scanned first, then pending
  entries.sort(([a], [b]) => {
    const ai = scanLog.findIndex(s => s.barcode === a);
    const bi = scanLog.findIndex(s => s.barcode === b);
    if (ai === -1 && bi === -1) return 0;
    if (ai === -1) return 1;
    if (bi === -1) return -1;
    return ai - bi;
  });

  if (!entries.length) {
    list.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>ეს კატეგორია ცარიელია</p></div>';
    return;
  }

  list.innerHTML = entries.map(([barcode, item]) => {
    const status = getStatus(item);
    const diff = item.scannedQty - item.expectedQty;
    const colorClass = status === 'matched' ? 'green' : status === 'over' ? 'orange' : status === 'under' ? 'red' : 'muted';
    const statusText = status === 'matched' ? '✓ სწორი' : status === 'over' ? `+${diff} ლიშნური` : status === 'under' ? `${diff} ნაკლები` : '○ სკანი ელოდება';

    return `<div class="item-card ${status}" id="card-${barcode.replace(/[^a-zA-Z0-9]/g,'-')}">
      <div class="item-info">
        <div class="item-barcode">${barcode}</div>
        <div class="item-name">${item.productName} · ${item.colorSize}</div>
        <div class="item-status ${colorClass}">${statusText}</div>
      </div>
      <div class="item-qty">
        <div class="nums ${colorClass}">${item.scannedQty}<span class="denom">/${item.expectedQty}</span></div>
      </div>
    </div>`;
  }).join('');
}

function updateCounts() {
  const vals = Object.values(items);
  const matched = vals.filter(i => getStatus(i) === 'matched').length;
  const under   = vals.filter(i => getStatus(i) === 'under').length;
  const over    = vals.filter(i => getStatus(i) === 'over').length;
  const pending = vals.filter(i => getStatus(i) === 'pending').length;
  const all     = vals.length;

  document.getElementById('cntAll').textContent     = all;
  document.getElementById('cntMatched').textContent = matched;
  document.getElementById('cntUnder').textContent   = under;
  document.getElementById('cntOver').textContent    = over;
  document.getElementById('cntPending').textContent = pending;
}

function setFilter(filter, el) {
  currentFilter = filter;
  document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderItems();
  focusInput();
}

// ========== SESSION SAVE ==========
function saveSession() {
  try {
    localStorage.setItem('bh_session_' + operationId, JSON.stringify({ items, scanLog }));
  } catch(e) {}
}

// ========== LOG ==========
function showLog() {
  const body = document.getElementById('logBody');
  if (!scanLog.length) {
    body.innerHTML = '<div class="empty-state"><div class="icon">📋</div><p>ლოგი ცარიელია</p></div>';
  } else {
    body.innerHTML = scanLog.map(entry => `
      <div class="log-item">
        <span class="log-time">${entry.time}</span>
        <div class="log-dot ${entry.status === 'matched' ? 'green' : entry.status === 'over' ? 'orange' : 'red'}"></div>
        <span class="log-barcode">${entry.barcode}</span>
      </div>
    `).join('');
  }
  document.getElementById('logModal').classList.add('show');
}

function closeLog() {
  document.getElementById('logModal').classList.remove('show');
  focusInput();
}

// ========== SUMMARY & SEND ==========
function showSummary() {
  const vals = Object.values(items);
  const matched = vals.filter(i => getStatus(i) === 'matched').length;
  const under   = vals.filter(i => getStatus(i) === 'under').length;
  const over    = vals.filter(i => getStatus(i) === 'over').length;
  const pending = vals.filter(i => getStatus(i) === 'pending').length;

  document.getElementById('summaryOpInfo').textContent =
    `ოპერაცია #${operationId} · ${employeeName} · სულ ${vals.length} პოზიცია`;
  document.getElementById('sumMatched').textContent = matched;
  document.getElementById('sumUnder').textContent   = under;
  document.getElementById('sumOver').textContent    = over;
  document.getElementById('sumPending').textContent = pending;

  document.getElementById('summaryModal').classList.add('show');
}

function closeSummary() {
  document.getElementById('summaryModal').classList.remove('show');
  focusInput();
}

async function sendResults() {
  const btn = document.getElementById('confirmSendBtn');
  btn.textContent = '⏳ იგზავნება...';
  btn.disabled = true;

  const results = Object.entries(items).map(([barcode, item]) => ({
    barcode,
    productName: item.productName,
    colorSize: item.colorSize,
    expectedQty: item.expectedQty,
    scannedQty: item.scannedQty
  }));

  try {
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'submitScans',
        operationId,
        employee: employeeName,
        results
      })
    });
    const data = await res.json();

    if (data.success) {
      // Clear session
      localStorage.removeItem('bh_session_' + operationId);
      closeSummary();
      showToast('✓ წარმატებით გაიგზავნა!');
      setTimeout(() => { showScreen('screenWelcome'); }, 2000);
    } else {
      showToast('❌ შეცდომა: ' + (data.error || 'სცადე თავიდან'));
    }
  } catch(e) {
    showToast('❌ კავშირის შეცდომა');
  }

  btn.textContent = '✓ დადასტურება';
  btn.disabled = false;
}

// ========== UTILS ==========
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
